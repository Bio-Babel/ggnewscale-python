site_name: ggnewscale-python
use_directory_urls: false
theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
  - mkdocs-jupyter:
      include_source: true

hooks:
  - _gen_tutorials.py

nav:
  - Home: index.md
  - Tutorials:
      - Feature tour: tutorials/ggnewscale_overview.ipynb
  - API Reference: api.md
